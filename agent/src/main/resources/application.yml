spring:
  application:
    name: kafka-lag-agent
  profiles:
    active: groq

  ai:
    mcp:
      client:
        sse:
          connections:
            kafka:
              url: http://localhost:8080/sse
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:14b

  datasource:
    url: jdbc:h2:file:./data/agent-checkpoint;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

agent:
  mode: agentic        # agentic = LLM drives tool calls | phased = hardcoded flow
  poll-interval-ms: 60000
  warn-threshold: 1000
  critical-threshold: 10000
  remediation:
    auto-reset-enabled: false
    max-actions-per-run: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.mcp.agent: DEBUG
    org.springframework.ai: INFO
